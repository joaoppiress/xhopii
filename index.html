<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Index</title>
</head>
<body>
    <header>
        <section class="cabecalho-sociais">
            <section class="cabecalho-sociais-redes">
                <a href="#">
                    <img src="img/logo.png">
                </a>
                <a href="#">
                    <img src="img/img/logo-twitter.webp">
                </a>
                <a href="#">
                    <img src="img/img/logo-youtube.webp">
                </a>
            </section>
        </section>
    </header>
    <div class="login-card">
        <h2>Login</h2>
        <form>
            <div class="input-group">
                <input type="text" placeholder="Email">
            </div>
            <div class="input-group">
                <input type="password" placeholder="Senha">
            </div>
            <button type="button" class="btn-login">ENTRE</button>
        </form>

        <div class="login-options">
            <a href="#">Esqueci minha senha</a>
            <a href="#">Fazer login com SMS</a>
        </div>

        <div class="divider">
            <span>OU</span>
        </div>

        <div class="social-buttons">
            <button class="btn-social"><i class="fa-brands fa-facebook"></i> Facebook</button>
            <button class="btn-social"><i class="fa-brands fa-google"></i> Google</button>
            <button class="btn-social"><i class="fa-brands fa-apple"></i> Apple</button>
        </div>

        <div class="register-text">
            Novo na Xhopii? <a href="#">Cadastrar</a>
        </div>
    </div>
</main>
</body>
</html>
